<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Literacy Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="hero">
        <h1>Games I've Played & Studied</h1>
        <p>
            A curated archive of interactive systems, mechanics, and player experiences
            explored across platforms and genres.
        </p>
    </header>

    <section class="filters">
        <button data-filter="all">All</button>
        <button data-filter="singleplayer">Single Player</button>
        <button data-filter="multiplayer">Multiplayer</button>
        <button data-filter="narrative">Narrative</button>
        <button data-filter="live-service">Live Service</button>
    </section>

    <main class="game-grid" id="gameGrid">
        <!-- Game cards will render here dynamically -->
    </main>

    <footer>
        <p>Built by Rolo</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
