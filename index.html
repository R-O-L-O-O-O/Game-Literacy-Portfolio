<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Literacy Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/styles.css">
</head>

<div id="gameModal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <img id="modalImage">
    <h2 id="modalTitle"></h2>
    <p id="modalPlatform"></p>
    <p id="modalInsight"></p>
  </div>
</div>

<body>

    <header class="rolo">
        <h1 class=""site-title>Game Literacy Portfolio</h1>
        <p class=""site-subtitle>
            A curated archive of interactive systems, mechanics, and player experiences
            explored across platforms and genres.
        </p>
    </header>

    <section class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="singleplayer">Single Player</button>
        <button data-filter="multiplayer">Multiplayer</button>
        <button data-filter="narrative">Narrative</button>
        <button data-filter="shooter">Shooter</button>
        <button data-filter="rpg">Role-playing(RPG)</button>
        <button data-filter="live-service">Live Service</button>
    </section>

    <main class="game-grid" id="gameGrid">
        <!-- Game cards will render here dynamically -->
    </main>

    <footer>
        <p>Built by Rolo</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
